<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Testy parseru</title>
<style>
  body { font-family: -apple-system, sans-serif; margin: 2rem; max-width: 60rem; }
  .pass { color: #1a7f37; }
  .fail { color: #cf222e; font-weight: bold; }
  .warn { color: #9a6700; }
  li { margin: 0.15rem 0; }
  h2 { margin-top: 2rem; }
  #summary { font-size: 1.2rem; font-weight: bold; margin: 1rem 0; }
  pre { background: #f6f8fa; padding: 0.5rem; overflow-x: auto; }
</style>
</head>
<body>
<h1>Testy parseru IS MU</h1>
<div id="summary">Běží…</div>
<h2>Jednotkové testy (anonymizované vzorky)</h2>
<ul id="unit"></ul>
<h2>Reálné uložené stránky (jen lokálně, mimo repozitář)</h2>
<ul id="real"></ul>

<script type="module">
import { parseCourseHtml, parsePeriod, periodOrdinal, DAYS } from '../js/parser.js';

const results = [];
function test(name, fn) {
  try {
    fn();
    results.push({ name, ok: true });
  } catch (e) {
    results.push({ name, ok: false, error: String(e.message ?? e) });
  }
}
function assert(cond, msg) {
  if (!cond) throw new Error(msg);
}
function assertEqual(actual, expected, msg) {
  const a = JSON.stringify(actual);
  const b = JSON.stringify(expected);
  if (a !== b) throw new Error(`${msg}: očekáváno ${b}, dostal ${a}`);
}

const csHtml = await (await fetch('./fixtures/fixture-cs.html')).text();
const enHtml = await (await fetch('./fixtures/fixture-en.html')).text();

// ---------- český vzorek ----------
const cs = parseCourseHtml(csHtml);
test('CS: parsování proběhne bez chyb', () => {
  assertEqual(cs.errors, [], 'errors');
  assert(cs.ok, 'ok má být true');
});
test('CS: kód, název, fakulta, jazyk', () => {
  assertEqual(cs.course.code, 'XX101Zk', 'kód');
  assertEqual(cs.course.name, 'Testovací předmět', 'název');
  assertEqual(cs.course.faculty, 'law', 'fakulta');
  assertEqual(cs.course.language, 'Čeština', 'chybějící pole jazyka = čeština');
});
test('CS: období podzim2026', () => {
  assertEqual(cs.course.period, { raw: 'podzim2026', term: 'podzim', year: 2026 }, 'období');
});
test('CS: 6 platných skupin, 1 bez rozvrhu zahozena', () => {
  assertEqual(cs.course.groups.length, 6, 'počet skupin');
  assertEqual(cs.course.unscheduledIds, ['XX101Zk/07'], 'zahozené skupiny');
  assertEqual(cs.course.singleGroup, false, 'singleGroup');
});
test('CS: všech 5 tvarů parity + týdenní skupina', () => {
  const parityByNumber = Object.fromEntries(
    cs.course.groups.map(g => [g.number, [g.parity, g.day]])
  );
  assertEqual(parityByNumber['01'], ['odd', 'Po'], 'liché pondělí');
  assertEqual(parityByNumber['02'], ['even', 'Út'], 'sudé úterý');
  assertEqual(parityByNumber['03'], ['odd', 'St'], 'lichou středu');
  assertEqual(parityByNumber['04'], ['even', 'Čt'], 'sudý čtvrtek');
  assertEqual(parityByNumber['05'], ['odd', 'Pá'], 'lichý pátek');
  assertEqual(parityByNumber['06'], ['weekly', 'Út'], 'týdenní úterý');
});
test('CS: časy, místnosti, vyučující', () => {
  const g1 = cs.course.groups[0];
  assertEqual([g1.start, g1.end, g1.startMin, g1.endMin], ['10:00', '11:40', 600, 700], 'čas skupiny 01');
  assertEqual(g1.room, '315', 'místnost skupiny 01');
  assertEqual(g1.teacher, 'J. Novák', 'vyučující skupiny 01');
  const g6 = cs.course.groups[5];
  assertEqual(g6.teacher, null, 'skupina 06 bez vyučujícího');
  assertEqual(g6.room, '160', 'místnost skupiny 06');
});
test('CS: přednáška před nadpisem se do skupin nesplete', () => {
  assert(!cs.course.groups.some(g => g.room === 'Aula'), 'Aula nesmí být mezi skupinami');
});

// ---------- anglický vzorek ----------
const en = parseCourseHtml(enHtml);
test('EN: parsování proběhne bez chyb', () => {
  assertEqual(en.errors, [], 'errors');
  assert(en.ok, 'ok má být true');
});
test('EN: jazyk z pole Vyučovací jazyk', () => {
  assertEqual(en.course.language, 'Angličtina', 'jazyk');
});
test('EN: jediná skupina => singleGroup (varianta A)', () => {
  assertEqual(en.course.groups.length, 1, 'počet skupin');
  assertEqual(en.course.singleGroup, true, 'singleGroup');
  const g = en.course.groups[0];
  assertEqual([g.parity, g.day, g.start, g.end, g.room, g.teacher],
    ['weekly', 'Út', '8:00', '9:40', '160', 'K. Malá'], 'obsah skupiny');
});

// ---------- chybové a pomocné případy ----------
test('Chybí canonical => chyba, course null', () => {
  const r = parseCourseHtml('<html><title>x</title></html>');
  assert(!r.ok, 'ok má být false');
  assertEqual(r.course, null, 'course');
  assert(r.errors.length === 1, 'jedna chyba');
});
test('Stránka bez nadpisu skupin => hasSeminars false', () => {
  const r = parseCourseHtml(csHtml.replace('Rozvrh seminárních/paralelních skupin', 'Nic'));
  assert(r.ok, 'ok');
  assertEqual(r.course.hasSeminars, false, 'hasSeminars');
  assertEqual(r.course.groups, [], 'groups');
});
test('Pořadí období: jaro2026 < podzim2026 < jaro2027', () => {
  const j26 = periodOrdinal(parsePeriod('jaro2026'));
  const p26 = periodOrdinal(parsePeriod('podzim2026'));
  const j27 = periodOrdinal(parsePeriod('jaro2027'));
  assert(j26 < p26 && p26 < j27, `${j26}, ${p26}, ${j27}`);
});

// ---------- reálné lokální soubory (z výpisu adresáře serveru) ----------
const realList = document.getElementById('real');
try {
  const listing = await (await fetch('/')).text();
  const doc = new DOMParser().parseFromString(listing, 'text/html');
  const files = [...doc.querySelectorAll('a')]
    .map(a => a.getAttribute('href'))
    .filter(h => h && h.endsWith('.html') && !h.includes('test'));
  if (files.length === 0) {
    realList.innerHTML = '<li class="warn">Žádné reálné soubory nenalezeny (v pořádku např. na CI).</li>';
  }
  for (const href of files) {
    const html = await (await fetch('/' + href)).text();
    const r = parseCourseHtml(html);
    const label = decodeURIComponent(href);
    test(`REAL ${label}: parsování ok`, () => {
      assertEqual(r.errors, [], 'errors');
      assert(r.ok && r.course, 'ok');
      assert(r.course.hasSeminars, 'má mít semináře');
      assert(r.course.groups.length > 0, 'aspoň jedna skupina');
    });
    test(`REAL ${label}: všechny skupiny mají platný tvar`, () => {
      for (const g of r.course.groups) {
        assert(DAYS.includes(g.day), `den ${g.day} u ${g.id}`);
        assert(['weekly', 'odd', 'even'].includes(g.parity), `parita u ${g.id}`);
        assert(g.startMin < g.endMin, `čas u ${g.id}`);
        assert(g.room, `místnost u ${g.id}`);
      }
    });
    const li = document.createElement('li');
    const t = r.course
      ? `${r.course.code} (${r.course.period.raw}, ${r.course.language}): ` +
        `${r.course.groups.length} skupin, ${r.course.unscheduledIds.length} bez rozvrhu zahozeno, ` +
        `${r.course.groups.filter(g => !g.teacher).length} bez vyučujícího` +
        (r.course.singleGroup ? ' — JEDINÁ SKUPINA (varianta A)' : '') +
        (r.warnings.length ? ` — varování: ${r.warnings.join(' | ')}` : '')
      : `CHYBA: ${r.errors.join(' | ')}`;
    li.textContent = `${decodeURIComponent(href)} → ${t}`;
    realList.appendChild(li);
  }
} catch (e) {
  realList.innerHTML = `<li class="warn">Reálné soubory nešlo načíst: ${e}</li>`;
}

// ---------- vykreslení výsledků ----------
const unitList = document.getElementById('unit');
for (const r of results) {
  const li = document.createElement('li');
  li.className = r.ok ? 'pass' : 'fail';
  li.textContent = r.ok ? `✓ ${r.name}` : `✗ ${r.name} — ${r.error}`;
  (r.name.startsWith('REAL') ? realList : unitList).appendChild(li);
}
const failed = results.filter(r => !r.ok).length;
const summary = document.getElementById('summary');
summary.textContent = failed === 0
  ? `Vše prošlo: ${results.length} testů ✓`
  : `SELHALO ${failed} z ${results.length} testů`;
summary.className = failed === 0 ? 'pass' : 'fail';
document.title = failed === 0 ? 'Testy: OK' : `Testy: ${failed} FAIL`;
</script>
</body>
</html>
